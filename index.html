<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>POS System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Login Form -->
    <div id="login-container" class="container mt-5" style="max-width: 400px;">
      <div class="card">
        <div class="card-header">Login</div>
        <div class="card-body">
          <div class="mb-3">
            <label>Username</label>
            <input type="text" id="username" class="form-control">
          </div>
          <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control">
          </div>
          <button class="btn btn-primary" id="btn-login">Login</button>
          <div id="login-error" class="text-danger mt-2"></div>
        </div>
      </div>
    </div>

    <!-- Main App (setelah login) -->
    <div id="main-container" style="display:none;">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">POS System</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item"><a class="nav-link" href="#" data-page="dashboard">Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="products">Produk</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="pos">Kasir</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="reports">Laporan</a></li>
            </ul>
            <span class="navbar-text text-white me-3" id="user-info"></span>
            <button class="btn btn-outline-light" id="logout">Logout</button>
          </div>
        </div>
      </nav>

      <div class="container mt-4" id="page-content">
        <!-- Konten dinamis di sini -->
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
