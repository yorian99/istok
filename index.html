<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>POS System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
  <style>
    body { background-color: #f8f9fa; }
    .card { border-radius: 10px; }
    .table img { max-width: 50px; max-height: 50px; object-fit: cover; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Login Form -->
    <div id="login-container" class="container mt-5" style="max-width: 400px;">
      <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
          <h4>Login POS System</h4>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Masukkan username">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Masukkan password">
          </div>
          <button class="btn btn-primary w-100" id="btn-login">Login</button>
          <div id="login-error" class="text-danger mt-2 text-center"></div>
        </div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-container" style="display:none;">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">POS System</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item"><a class="nav-link" href="#" data-page="dashboard">Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="products">Produk</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="pos">Kasir</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-page="reports">Laporan</a></li>
            </ul>
            <span class="navbar-text text-white me-3" id="user-info"></span>
            <button class="btn btn-outline-light" id="logout">Logout</button>
          </div>
        </div>
      </nav>
      <div class="container mt-4" id="page-content"></div>
    </div>
  </div>

  <!-- Modal Produk -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Tambah/Edit Produk</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="productForm">
            <input type="hidden" id="productId">
            <div class="mb-3"><label>SKU</label><input type="text" id="sku" class="form-control" required></div>
            <div class="mb-3"><label>Nama Produk</label><input type="text" id="name" class="form-control" required></div>
            <div class="row">
              <div class="col-md-6"><label>Harga Beli</label><input type="number" id="price_buy" class="form-control" required></div>
              <div class="col-md-6"><label>Harga Jual</label><input type="number" id="price_sell" class="form-control" required></div>
            </div>
            <div class="row">
              <div class="col-md-6"><label>Stok</label><input type="number" id="stock" class="form-control" required></div>
              <div class="col-md-6"><label>Satuan</label><input type="text" id="unit" class="form-control" value="pcs"></div>
            </div>
            <div class="mb-3"><label>Foto</label><input type="file" id="photo" class="form-control" accept="image/*"></div>
            <div id="currentPhoto"></div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn btn-primary" id="saveProductBtn">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const API_BASE = 'https://script.google.com/macros/s/AKfycbySgCDmrWal_vWNoH89tMVLLWSSF7M6ISZ67gMOZFj34WQUsJq5KhfqanZ6RXXhPSQd/exec';
    let authToken = null;
    let currentUser = null;

    async function apiRequest(path, method = 'GET', data = null) {
      const url = new URL(API_BASE);
      url.searchParams.append('path', path);
      if (authToken) url.searchParams.append('token', authToken);
      const options = { method };
      if (data) {
        options.method = 'POST';
        options.body = JSON.stringify(data);
      }
      try {
        const res = await fetch(url, options);
        return await res.json();
      } catch (e) {
        console.error(e);
        return { success: false, message: 'Koneksi gagal' };
      }
    }

    document.getElementById('btn-login').addEventListener('click', async () => {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await apiRequest('login', 'POST', { username, password });
      if (res.success) {
        authToken = res.token;
        currentUser = res.user;
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        document.getElementById('user-info').innerText = `${currentUser.username} (${currentUser.role})`;
        loadPage('dashboard');
      } else {
        document.getElementById('login-error').innerText = res.message;
      }
    });

    document.getElementById('logout').addEventListener('click', () => {
      authToken = null;
      currentUser = null;
      document.getElementById('login-container').style.display = 'block';
      document.getElementById('main-container').style.display = 'none';
    });

    document.querySelectorAll('[data-page]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        loadPage(link.getAttribute('data-page'));
      });
    });

    async function loadPage(page) {
      const content = document.getElementById('page-content');
      if (page === 'dashboard') await loadDashboard(content);
      else if (page === 'products') await loadProducts(content);
      else if (page === 'pos') await loadPOS(content);
      else if (page === 'reports') await loadReports(content);
    }

    async function loadDashboard(container) {
      const data = await apiRequest('dashboard', 'GET');
      container.innerHTML = `
        <div class="row">
          <div class="col-md-4"><div class="card text-white bg-primary mb-3"><div class="card-body"><h5>Penjualan Hari Ini</h5><p class="fs-3">${formatRupiah(data.totalSalesToday || 0)}</p></div></div></div>
          <div class="col-md-4"><div class="card text-white bg-warning mb-3"><div class="card-body"><h5>Stok Menipis</h5><p class="fs-3">${data.lowStockCount || 0} produk</p></div></div></div>
        </div>
      `;
    }

    let productsData = [], productsTable;
    async function loadProducts(container) {
      const products = await apiRequest('products', 'GET');
      productsData = products;
      let html = `<div class="d-flex justify-content-between"><h2>Produk</h2><button class="btn btn-success" id="btn-add-product">+ Tambah</button></div>
        <table id="products-table" class="table"><thead><tr><th>SKU</th><th>Nama</th><th>Harga Beli</th><th>Harga Jual</th><th>Stok</th><th>Foto</th><th>Aksi</th></tr></thead><tbody>`;
      products.forEach(p => {
        html += `<tr>
          <td>${escapeHtml(p.sku)}</td>
          <td>${escapeHtml(p.name)}</td>
          <td>${formatRupiah(p.price_buy)}</td>
          <td>${formatRupiah(p.price_sell)}</td>
          <td>${p.stock}</td>
          <td>${p.photo_url ? `<img src="${p.photo_url}" width="50">` : '-'}</td>
          <td><button class="btn btn-sm btn-warning edit-product" data-id="${p.id}">Edit</button> <button class="btn btn-sm btn-danger delete-product" data-id="${p.id}">Hapus</button></td>
        </tr>`;
      });
      html += `</tbody></table>`;
      container.innerHTML = html;
      if (productsTable) productsTable.destroy();
      productsTable = $('#products-table').DataTable();
      document.getElementById('btn-add-product').onclick = () => showProductModal();
      document.querySelectorAll('.edit-product').forEach(btn => btn.onclick = () => showProductModal(productsData.find(p => p.id == btn.dataset.id)));
      document.querySelectorAll('.delete-product').forEach(btn => btn.onclick = async () => {
        if (confirm('Yakin hapus?')) {
          const res = await apiRequest('products', 'POST', { action: 'delete', id: btn.dataset.id });
          if (res.success) { alert('Terhapus'); loadProducts(container); }
          else alert('Gagal');
        }
      });
    }

    function showProductModal(product = null) {
      const modal = new bootstrap.Modal(document.getElementById('productModal'));
      document.getElementById('productId').value = product ? product.id : '';
      document.getElementById('sku').value = product ? product.sku : '';
      document.getElementById('name').value = product ? product.name : '';
      document.getElementById('price_buy').value = product ? product.price_buy : '';
      document.getElementById('price_sell').value = product ? product.price_sell : '';
      document.getElementById('stock').value = product ? product.stock : '';
      document.getElementById('unit').value = product ? product.unit : 'pcs';
      document.getElementById('currentPhoto').innerHTML = product && product.photo_url ? `<img src="${product.photo_url}" width="100"><br><small>Foto saat ini</small>` : '';
      document.getElementById('photo').value = '';
      modal.show();
    }

    document.getElementById('saveProductBtn').addEventListener('click', async () => {
      const id = document.getElementById('productId').value;
      const sku = document.getElementById('sku').value;
      const name = document.getElementById('name').value;
      const price_buy = parseFloat(document.getElementById('price_buy').value);
      const price_sell = parseFloat(document.getElementById('price_sell').value);
      const stock = parseInt(document.getElementById('stock').value);
      const unit = document.getElementById('unit').value;
      let photo_url = null;
      const photoFile = document.getElementById('photo').files[0];
      if (photoFile) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const base64 = e.target.result.split(',')[1];
          const uploadRes = await apiRequest('uploadPhoto', 'POST', { fileName: photoFile.name, base64Data: base64, mimeType: photoFile.type });
          if (uploadRes.success) photo_url = uploadRes.url;
          else alert('Upload foto gagal');
          saveProduct(id, sku, name, price_buy, price_sell, stock, unit, photo_url);
        };
        reader.readAsDataURL(photoFile);
      } else {
        saveProduct(id, sku, name, price_buy, price_sell, stock, unit, null);
      }
    });

    async function saveProduct(id, sku, name, price_buy, price_sell, stock, unit, photo_url) {
      const action = id ? 'update' : 'add';
      const payload = { action, sku, name, category_id: 1, supplier_id: 1, price_buy, price_sell, stock, unit };
      if (id) payload.id = id;
      if (photo_url) payload.photo_url = photo_url;
      const res = await apiRequest('products', 'POST', payload);
      if (res.success) {
        alert('Produk tersimpan');
        bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
        loadProducts(document.getElementById('page-content'));
      } else alert('Gagal simpan');
    }

    let cart = [];
    async function loadPOS(container) {
      const products = await apiRequest('products', 'GET');
      cart = [];
      function renderCart() {
        let total = 0;
        let html = `<table class="table"><thead><tr><th>Produk</th><th>Qty</th><th>Harga</th><th>Subtotal</th><th></th></tr></thead><tbody>`;
        cart.forEach((item, idx) => {
          const subtotal = item.qty * item.price_sell;
          total += subtotal;
          html += `<tr>
            <td>${escapeHtml(item.name)}</td>
            <td><input type="number" class="form-control cart-qty" data-idx="${idx}" value="${item.qty}" style="width:80px"></td>
            <td>${formatRupiah(item.price_sell)}</td>
            <td>${formatRupiah(subtotal)}</td>
            <td><button class="btn btn-sm btn-danger remove-cart" data-idx="${idx}">Hapus</button></td>
          </tr>`;
        });
        html += `</tbody><tfoot><tr><td colspan="3" class="text-end"><strong>Total:</strong></td><td><strong>${formatRupiah(total)}</strong></td><td></td></tr></tfoot></table>
          <div class="row"><div class="col-md-6"><label>Nama Pelanggan</label><input type="text" id="customer-name" class="form-control"></div>
          <div class="col-md-6"><label>Metode Pembayaran</label><select id="payment-method" class="form-select"><option>Cash</option><option>Transfer</option><option>E-Wallet</option></select></div></div>
          <button id="process-sale" class="btn btn-primary mt-3">Proses Penjualan</button>`;
        document.getElementById('cart-container').innerHTML = html;
        document.querySelectorAll('.cart-qty').forEach(inp => inp.addEventListener('change', (e) => {
          const idx = inp.dataset.idx;
          let qty = parseInt(inp.value);
          if (isNaN(qty) || qty < 1) qty = 1;
          cart[idx].qty = qty;
          renderCart();
        }));
        document.querySelectorAll('.remove-cart').forEach(btn => btn.addEventListener('click', (e) => {
          cart.splice(btn.dataset.idx, 1);
          renderCart();
        }));
        document.getElementById('process-sale').onclick = async () => {
          const customer = document.getElementById('customer-name').value;
          const payment = document.getElementById('payment-method').value;
          const items = cart.map(i => ({ product_id: i.id, qty: i.qty, price: i.price_sell }));
          const total = cart.reduce((s,i) => s + i.qty * i.price_sell, 0);
          const res = await apiRequest('sales', 'POST', { customer_name: customer, payment_method: payment, total, items });
          if (res.success) {
            alert(`Penjualan berhasil! Invoice: ${res.invoice}`);
            cart = [];
            renderCart();
            loadProducts(document.getElementById('page-content')); // refresh stok
          } else alert('Gagal');
        };
      }
      let productHtml = `<div class="row"><div class="col-md-5"><h3>Daftar Produk</h3><div class="list-group">`;
      products.forEach(p => {
        productHtml += `<button class="list-group-item list-group-item-action add-to-cart" data-id="${p.id}" data-name="${p.name}" data-price="${p.price_sell}" data-stock="${p.stock}">
          <strong>${escapeHtml(p.name)}</strong><br><small>${formatRupiah(p.price_sell)} | Stok: ${p.stock}</small>
        </button>`;
      });
      productHtml += `</div></div><div class="col-md-7"><h3>Keranjang</h3><div id="cart-container"></div></div></div>`;
      container.innerHTML = productHtml;
      document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        const price = parseFloat(btn.dataset.price);
        const stock = parseInt(btn.dataset.stock);
        const existing = cart.find(i => i.id == id);
        if (existing) {
          if (existing.qty + 1 <= stock) existing.qty++;
          else alert('Stok tidak cukup');
        } else {
          if (1 <= stock) cart.push({ id, name, price_sell: price, qty: 1 });
          else alert('Stok tidak cukup');
        }
        renderCart();
      }));
      renderCart();
    }

    async function loadReports(container) {
      const sales = await apiRequest('sales', 'GET');
      let html = `<h2>Laporan Penjualan</h2><table id="reports-table" class="table"><thead><tr><th>Invoice</th><th>Tanggal</th><th>Pelanggan</th><th>Total</th><th>Metode</th></tr></thead><tbody>`;
      sales.forEach(s => {
        html += `<tr><td>${escapeHtml(s.invoice)}</td><td>${new Date(s.created_at).toLocaleString()}</td><td>${escapeHtml(s.customer_name)}</td><td>${formatRupiah(s.total)}</td><td>${escapeHtml(s.payment_method)}</td></tr>`;
      });
      html += `</tbody></table>`;
      container.innerHTML = html;
      $('#reports-table').DataTable();
    }

    function formatRupiah(angka) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(angka); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  </script>
</body>
</html>
